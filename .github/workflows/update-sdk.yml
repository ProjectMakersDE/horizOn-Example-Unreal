name: Update SDK

on:
  repository_dispatch:
    types: [update-sdk]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout example project
        uses: actions/checkout@v4

      - name: Checkout SDK at release tag
        uses: actions/checkout@v4
        with:
          repository: ProjectMakersDE/horizOn-SDK-Unreal
          ref: v${{ github.event.client_payload.version }}
          path: sdk-source
          token: ${{ secrets.SYNC_TOKEN }}

      - name: Replace SDK files
        run: |
          rm -rf Plugins/HorizonSDK
          cp -r sdk-source/Plugins/HorizonSDK Plugins/HorizonSDK

      - name: Cleanup
        run: rm -rf sdk-source

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          VERSION="${{ github.event.client_payload.version }}"
          git add -A
          git diff --staged --quiet || {
            git commit -m "chore(sdk): update horizOn SDK to v${VERSION}"
            git push
          }
